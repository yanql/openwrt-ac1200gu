name: build-immortalwrt-ac1200gu-ssrplus

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Prepare tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zstd unzip wget file

      - name: Download ImmortalWrt ImageBuilder 24.10.6 (ramips/mt7621)
        run: |
          wget -q https://downloads.immortalwrt.org/releases/24.10.6/targets/ramips/mt7621/immortalwrt-imagebuilder-24.10.6-ramips-mt7621.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf immortalwrt-imagebuilder-24.10.6-ramips-mt7621.Linux-x86_64.tar.zst
          mv immortalwrt-imagebuilder-24.10.6-ramips-mt7621.Linux-x86_64 ib
          echo "IB=$PWD/ib" >> $GITHUB_ENV

      - name: Patch rootfs.mk (fix IB empty-command syntax bug)
        run: |
          f="$PWD/ib/include/rootfs.mk"
          sed -i 's|$(if $(IB),,awk|$(if $(IB),:,awk|' "$f"
          echo "--- patched ---"; grep -n 'if $(IB)' "$f" || true

      - name: Inject SSR Plus+ app + SSR core + local index
        run: |
          cd "$IB"
          mkdir -p dl
          # SSR Plus+ 应用（fw876），依赖走 ImmortalWrt 官方源
          wget -q -O packages/luci-app-ssr-plus.ipk https://github.com/fw876/helloworld/releases/download/v196.2/luci-app-ssr-plus_196-r2_all.ipk
          # SSR 协议核心（passwall_packages，匹配 24.10 openssl3/pcre2）
          wget -q -O dl/pw.zip https://github.com/Openwrt-Passwall/openwrt-passwall2/releases/download/26.6.16-1/passwall_packages_ipk_mipsel_24kc.zip
          unzip -o -q dl/pw.zip -d dl/pw
          find dl/pw -name 'shadowsocksr-libev-ssr-redir*.ipk' -exec cp -f {} packages/ \;
          find dl/pw -name 'shadowsocksr-libev-ssr-local*.ipk' -exec cp -f {} packages/ \;
          ./scripts/ipkg-make-index.sh packages/ > packages/Packages 2>/dev/null || true
          sed -i 's/^option check_signature/# option check_signature/' repositories.conf || true
          echo "=== 注入 ipk ==="; ls -l packages/*.ipk
          echo "=== 本地索引 ==="; grep '^Package:' packages/Packages || true

      - name: Show available profiles
        run: |
          cd "$IB"
          make info | grep -A4 "asus_rt-ac57u-v1"

      - name: Build firmware (SSR Plus+ 精简 + SSR 核心 + 一键订阅)
        run: |
          cd "$IB"
          make image \
            PROFILE="asus_rt-ac57u-v1" \
            PACKAGES="luci luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn luci-app-ssr-plus shadowsocksr-libev-ssr-redir shadowsocksr-libev-ssr-local simple-obfs-client kmod-nft-tproxy kmod-nft-socket kmod-nft-nat -dnsmasq dnsmasq-full"

      - name: Show results (体积 + overlay 估算)
        run: |
          cd "$IB"
          BIN=$(ls bin/targets/ramips/mt7621/*sysupgrade.bin)
          SZ=$(stat -c%s "$BIN")
          echo "=== 产物 ==="; ls -lh "$BIN"
          echo "=== sysupgrade 大小 ==="; awk "BEGIN{printf \"%.2f MB\n\", $SZ/1048576}"
          # firmware 分区 0xfb0000 = 16449536 B (15.68MiB)
          echo "=== overlay 可写空间估算 (firmware 15.68MiB - 镜像) ==="
          awk "BEGIN{printf \"%.2f MB\n\", (16449536-$SZ)/1048576}"
          echo "=== 已装代理组件 ==="
          cat bin/targets/ramips/mt7621/*.manifest | grep -iE "ssr-plus|shadowsocksr|shadowsocks-rust|xray|sing-box|simple-obfs|ipt2socks|dns2" || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-ac1200gu-ssrplus
          path: |
            ${{ env.IB }}/bin/targets/ramips/mt7621/*sysupgrade.bin
            ${{ env.IB }}/bin/targets/ramips/mt7621/*.manifest
