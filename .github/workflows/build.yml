name: build-openwrt-ac1200gu

on:
  workflow_dispatch:
    inputs:
      pkgmode:
        description: 'clean = 纯净镜像; full = 带PassWall2'
        required: false
        default: 'full'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Prepare tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zstd unzip wget file

      - name: Download OpenWrt ImageBuilder 24.10.7 (ramips/mt7621)
        run: |
          wget -q https://downloads.openwrt.org/releases/24.10.7/targets/ramips/mt7621/openwrt-imagebuilder-24.10.7-ramips-mt7621.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf openwrt-imagebuilder-24.10.7-ramips-mt7621.Linux-x86_64.tar.zst
          mv openwrt-imagebuilder-24.10.7-ramips-mt7621.Linux-x86_64 ib
          echo "IB=$PWD/ib" >> $GITHUB_ENV

      - name: Fetch PassWall2 packages (mipsel_24kc)
        if: ${{ github.event.inputs.pkgmode != 'clean' }}
        run: |
          base=https://github.com/Openwrt-Passwall/openwrt-passwall2/releases/download/26.6.16-1
          mkdir -p dl
          wget -q -P dl $base/luci-app-passwall2_26.6.16-r1_all.ipk
          wget -q -P dl $base/luci-i18n-passwall2-zh-cn_26.6.16_all.ipk
          wget -q -P dl $base/passwall_packages_ipk_mipsel_24kc.zip
          unzip -o -q dl/passwall_packages_ipk_mipsel_24kc.zip -d dl/pw
          # 把所有 ipk 放进 ImageBuilder 本地源
          find dl -name '*.ipk' -exec cp -f {} "$IB/packages/" \;
          echo "=== 本地源 ipk 数量 ==="; ls "$IB/packages/" | wc -l

      - name: Build firmware (PassWall2 + SSR 轻量核心)
        run: |
          cd "$IB"
          if [ "${{ github.event.inputs.pkgmode }}" = "clean" ]; then
            echo ">>> 纯净镜像(无额外包)"
            make image PROFILE="asus_rt-ac57u-v1"
          else
            echo ">>> 带 PassWall2"
            make image \
              PROFILE="asus_rt-ac57u-v1" \
              PACKAGES="luci luci-ssl luci-i18n-base-zh-cn luci-app-passwall2 luci-i18n-passwall2-zh-cn shadowsocksr-libev-ssr-redir shadowsocksr-libev-ssr-local simple-obfs-client chinadns-ng tcping -dnsmasq dnsmasq-full"
          fi

      - name: Show results
        run: |
          cd "$IB"
          echo "=== 产物 ==="
          ls -lh bin/targets/ramips/mt7621/*.bin
          echo "=== 大小占用 ==="
          ls -l bin/targets/ramips/mt7621/*sysupgrade.bin | awk '{print $5" bytes"}'

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ac1200gu-passwall2
          path: |
            ${{ env.IB }}/bin/targets/ramips/mt7621/*sysupgrade.bin
            ${{ env.IB }}/bin/targets/ramips/mt7621/*initramfs-kernel.bin
